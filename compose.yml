version: '3.9'

services:
  db:
    image: postgres:15
    container_name: label-studio-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=labelstudio
      - POSTGRES_PASSWORD=YOUR_SECURE_PASSWORD  # เปลี่ยนรหัสผ่านตรงนี้
      - POSTGRES_DB=labelstudio_data
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: label-studio-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      # ตั้งค่าให้ Label Studio เชื่อมต่อกับ PostgreSQL
      - DJANGO_DB=default
      - POSTGRE_NAME=labelstudio_data
      - POSTGRE_USER=labelstudio
      - POSTGRE_PASSWORD=YOUR_SECURE_PASSWORD
      - POSTGRE_PORT=5432
      - POSTGRE_HOST=db  # อ้างอิงชื่อ Service ของ Database
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
    volumes:
      - label-studio-data:/label-studio/data

volumes:
  postgres-data:
  label-studio-data: